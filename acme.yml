services:
  acme:
    hostname: acme{{.Task.Slot}}
    image: $ACME_IMAGE
    volumes:
      - nginx_certs:/acme.sh
      # For refreshing Nginx container
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      CF_Token: $CLOUDFLARE_API_TOKEN
      CF_Email: $CLOUDFLARE_EMAIL
    command: daemon
