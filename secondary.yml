services:
  nginx:
    deploy:
      mode: replicated
      replicas: $NGINX_SECONDARY_REPLICAS
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.${STACK}_nginx_secondary == 1
  acme:
    deploy:
      mode: replicated
      replicas: $ACME_SECONDARY_REPLICAS
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.labels.${STACK}_acme_secondary == 1
